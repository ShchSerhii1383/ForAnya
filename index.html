<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для тебе ❤️</title>

<style>

body{
margin:0;
font-family:'Montserrat', sans-serif;;
overflow:hidden;
color:white;
/*background:radial-gradient(circle at bottom,#1b0033,#000);*/
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.fade-in{

opacity:0;
transform:translateY(20px);

animation:fadeIn 1s forwards;

}

@keyframes fadeIn{

to{
opacity:1;
transform:translateY(0);
}

}

#bgStart{
background-image:url("start.png");
}

#bgMain{
background-image:url("back1.png");
display:none;
}

.background{
transition:opacity 0,5s;
}

/* ЗОРІ */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* СТАРТОВИЙ ЕКРАН */

.start{

position:fixed;

width:100%;
height:100%;

display:flex;

align-items:center;
justify-content:center;

flex-direction:column;

z-index:300;

}

.bigGift{

width:400px;
height:400px;

background:linear-gradient(45deg,#ff6ec4,#ff3ea5);

border-radius:18px;

position:relative;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 0 20px #ff6ec4,
0 0 40px #ff6ec4;

transition:0.5s;
}

.bigGift:hover{
transform:scale(1.1) rotate(5deg);
}

.bigLid{

position:absolute;

top:-10px;

width:100%;
height:45%;

background:#ff8bd8;

border-radius:18px;

transform-origin:top;

transition:0.7s;

}

@media (max-width:768px){

.bigGift{
width:220px;
height:220px;
}

.box img{
width:80px;
height:80px;
}

.card{
height:120px;
}

.popup img{
max-width:260px;
}

.text{
font-size:18px;
}

}

/* GRID */

.container{
display:none;
grid-template-columns:repeat(3,1fr);
gap:30px;
padding: 40px;
max-width:900px;
margin: auto;

top: 20%;
left: 20%;

transform: translate(-5%, 20%);
}

/* ПОДАРУНКИ */

.card{
height:160px;
perspective:900px;
cursor:pointer;
}

.card{
animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe{
0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}
}

.gift{

position:relative;
width:100%;
height:100%;

transition:transform 0.4s;

}

.card:hover .gift{
transform:rotateY(12deg) scale(1.08);
}

.box{

width:100%;
height:100%;

background:linear-gradient(45deg,#ff6ec4,#ff3ea5);

border-radius:14px;

box-shadow:
0 0 10px #ff6ec4,
0 0 25px #ff6ec4;

display:flex;
align-items:center;
justify-content:center;
}

.box img{
width:110px;
height:110px;
border-radius:18px;
object-fit:cover;
transform: translateY(14px);
box-shadow: 0 4px 10 px rgba(0,0,0,0.4);
}

.lid{

position:absolute;

width:100%;
height:40%;

background:#ca437b;

top:-5px;

border-radius:14px;

transform-origin:top;

transition:transform 0.6s;

}


.card.open .lid{
transform:rotateX(160deg);
}

/* POPUP */

.popup{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

align-items:center;
justify-content:center;

flex-direction:column;

z-index:100;
}

.popup img{
max-width:320px;
border-radius:12px;
margin-bottom:20px;
}

.text{
max-width:400px;
font-size:20px;
min-height:60px;
text-align:center;
}

.close{

margin-top:20px;

padding:10px 25px;

border:none;

border-radius:10px;

background:#ff6ec4;

color:white;

font-size:16px;

cursor:pointer;
}

/* HEART */

.heart{
position:fixed;
font-size:28px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

@keyframes pop{
0%{
transform:scale(1);
opacity:1;
}

70%{
transform:scale(1.4);
opacity:1;
}

100%{
transform:scale(0);
opacity:0;
}
}

/* SAKURA */

.sakura{
position:fixed;
font-size:28px;
animation:sakura linear infinite;
}

@keyframes sakura{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* BEAR */

.bear{
position:fixed;
top:-50px;
width:40px;
pointer-events:none;
z-index:2;
animation:fallBear linear forwards;
}

@keyframes fallBear{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}
/* Cursor heart */
.cursor-heart{
position:fixed;
font-size:18px;
pointer-events:none;
animation:heartFly 1s linear forwards;
}

@keyframes heartFly{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-40px) scale(0.5);
opacity:0;
}

}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
animation:confetti 4s linear forwards;
}

@keyframes confetti{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh) rotate(720deg)}
}

/* FINAL */

.final{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;

align-items:center;
justify-content:center;

flex-direction:column;

font-size:46px;

z-index:200;
}

.final small{
font-size:22px;
margin-top:20px;
}

.photo-gallery{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.photo{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(40px);
}

.photo img{
width:200px;
border-radius:6px;
}

.p1{
transform:rotate(-8deg) translateY(40px);
animation:photoShow 1s forwards;
animation-delay:0.5s;
}

.p2{
transform:rotate(5deg) translateY(40px);
animation:photoShow 1s forwards;
animation-delay:1.5s;
}

.p3{
transform:rotate(-4deg) translateY(40px);
animation:photoShow 1s forwards;
animation-delay:2.5s;
}

@keyframes photoShow{

0%{
opacity:0;
transform:translateY(40px) scale(0.8);
}

100%{
opacity:1;
transform:translateY(0) scale(1);
}

}

.final-message{
margin-top:40px;
font-size:28px;
text-align:center;
color:#d6336c;
opacity:0;
animation:finalText 2s forwards;
animation-delay:4s;
font-family:'Marck Script', cursive;
font-size:32px;
user-select:none;
caret-color:transparent;
}

@keyframes finalText{

0%{
opacity:0;
transform:translateY(20px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>
<div class="container fade-in"></div>
<div id="bgStart" class="background"></div>
<div id="bgMain" class="background"></div>  

<audio id="bgMusic" loop>
<source src="Vesna.mp3" type="audio/mpeg">
</audio>

<script>

document.body.addEventListener("click", function(){
const music=document.getElementById("bgMusic");
music.play();
},{once:true});

</script>

<div class="start" id="start">

<div class="bigGift" onclick="openStart(this)">
<!--<div class="bigLid"></div>-->

<div class="bigPhoto">
<img src="Secret box.png">
</div>

</div>

<p style="margin-top:20px">Натисни щоб відкрити подарунок</p>

</div>

<div class="container" id="grid">

<!-- 9 подарунків -->

<div class="card" onclick="openCard(0,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy1.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(1,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy8.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(2,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy3.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(3,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy4.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(4,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy9.png"></div>
</div>
</div>

<div class="card" onclick="openCard(5,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy2.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(6,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy6.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(7,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy7.PNG"></div>
</div>
</div>

<div class="card" onclick="openCard(8,this)">
<div class="gift">
<div class="lid"></div>
<div class="box"><img src="Teddy5.PNG"></div>
</div>
</div>

</div>

<div class="popup" id="popup">
<img id="popupImg">
<div class="text" id="popupText"></div>
<button class="close" onclick="closeCard()">Закрити</button>
</div>

<div class="final" id="final">
<div>З 8 березня 🌸❤️</div>
<small>Ти робиш цей світ красивішим.
І якщо краса дійсно може врятувати світ - у нього точно є головна героїня 😉</small>

<div class="photo-gallery">

<div class="photo p1">
<img src="Anya10.png">
</div>

<div class="photo p2">
<img src="Anya11.png">
</div>

<div class="photo p3">
<img src="Anya12.png">
</div>
<div class="final-message">
Я дуже радий, що знайом з тобою ❤️
</div>
</div>
</div>
<script>

function openStart(el){

el.classList.add("open");

document.getElementById("bgStart").style.display="none";
document.getElementById("bgMain").style.display="block";

setTimeout(()=>{
document.querySelector(".container").style.display="grid";
},1200);

el.classList.add("open");

setTimeout(()=>{

document.getElementById("start").style.display="none";
document.getElementById("grid").style.display="grid";

},800)
bgStart.style.opacity="0";
}

let cardsData=[
{img:"Anya1.png",text:"З твоєю посмішкою цей світ стає теплішим. Навіть весну чекати не потрібно - одразу настає літо ☀️"},
{img:"Anya2.png",text:"Аня, твої образи надихають. Поруч із тобою навіть звичайний день стає трохи особливим ✨"},
{img:"Anya3.png",text:"Глибину твого погляду не кожна камера зможе передати. Деякі речі просто неможливо зафіксувати - вони відчуваються 📸"},
{img:"Anya4.png",text:"Анна Олександрівна успіх не шукає - він її знаходить. Навіть коли все під контролем… в халаті, в ліжку і з ноутбуком"},
{img:"Anya5.png",text:"У тебе дуже тонкий смак до всього красивого. Я досі дивуюсь, чому тебе не запросили на подіум у Мілані - конкуренцію, мабуть, не всі б витримали"},
{img:"Anya6.png",text:"Бажаю, щоб пиво по знижках стояло на всіх полицях мереж і всі питали: «Хто ця легендарна продажниця, що витіснила всіх конкурентів своєю ідеальною викладкою?» 🍻"},
{img:"Anya7.png",text:"Зима просто не витримала твоєї енергії, теплоти і життєрадісності. Сказала na shledanou і тихенько пішла ❄️"},
{img:"Anya8.png",text:"Аня, всі вершини, які ти задумала - я впевнений, ти підкориш. І вже чекаю нової гірської пригоди легендарної команди рожевих панамок ⛰️"},
{img:"Anya9.png",text:"Нехай у житті завжди буде місце для солодкого - у десертах, подорожах і моментах щастя 🍰✨"}
];

let opened=0;
let currentCard=0;

let typingTimer=null;

function openCard(index,element){

currentCard=index;

element.classList.add("open");

setTimeout(()=>{

document.getElementById("popupImg").src=cardsData[index].img;

typeText(cardsData[index].text);

document.getElementById("popup").style.display="flex";

},500);

}

function closeCard(){

clearInterval(typingTimer);

document.getElementById("popup").style.display="none";

document.querySelectorAll(".card")[currentCard].style.display="none";

opened++;

if(opened===9){

setTimeout(()=>{

document.getElementById("final").style.display="flex";

launchConfetti();

},800)

}

}

function typeText(text){

let el=document.getElementById("popupText");

el.innerHTML="";

let i=0;

clearInterval(typingTimer);

typingTimer=setInterval(()=>{

el.innerHTML+=text[i];

i++;

if(i>=text.length){
clearInterval(typingTimer);
}

},40);

}


/* ЗОРІ */

for(let i=0;i<40;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* HEART */

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

},1200);

if(Math.random()>0.7){

setTimeout(()=>{
heart.style.animation="pop 0.6s forwards";
},3000);

}

/* SAKURA */

setInterval(()=>{

let s=document.createElement("div");

s.className="sakura";

s.innerHTML="🌸";

s.style.left=Math.random()*100+"vw";

s.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(s);

setTimeout(()=>s.remove(),12000);

},900);


/* Bear */

function createBear(){

const bear=document.createElement("img");

bear.src="bear.png";
bear.className="bear";

bear.style.left=Math.random()*100+"vw";
bear.style.animationDuration=(6+Math.random()*4)+"s";
bear.style.width=(30+Math.random()*40)+"px";

document.body.appendChild(bear);

setTimeout(()=>{
bear.remove();
},10000);

}
setInterval(createBear,3500);


/* CURSOR */

if(window.innerWidth > 900){

document.addEventListener("mousemove",function(e){

const heart=document.createElement("div");

heart.className="cursor-heart";
heart.innerHTML="❤️";

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

}

/* CONFETTI */

function launchConfetti(){

for(let i=0;i<160;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=`hsl(${Math.random()*360},100%,60%)`;

c.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

</script>

</body>
</html>
